services:
  darwin:
    build: .
    container_name: darwin-agent
    restart: unless-stopped
    ports:
      - "7761:7761"    # REST API
    volumes:
      - darwin-data:/app/data          # SQLite database + backups
      - darwin-wallets:/app/wallets    # Encrypted wallet files
      - darwin-logs:/app/logs          # Log files
      # Mount Claude CLI config for Brain access (optional)
      # Uncomment if you have Claude CLI installed on the host:
      # - ${HOME}/.claude:/home/darwin/.claude:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7761/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: darwin-dashboard
    restart: unless-stopped
    ports:
      - "7760:80"      # Dashboard on nginx
    depends_on:
      darwin:
        condition: service_healthy

volumes:
  darwin-data:
  darwin-wallets:
  darwin-logs:
